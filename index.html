<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N Clock</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <!-- iOS用の設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="N Clock">
</head>
<body>
    <div class="n-clock-app">
        <!-- メインコンテンツ表示エリア -->
        <div id="content-area" class="content-area">
            <!-- JavaScriptで各モードの内容をここに描画 -->
        </div>

        <!-- 底部ナビゲーション（タブバー） -->
        <nav class="tab-bar">
            <button class="tab-item active" id="nav-clock">
                <!-- 改良点: アイコンを削除 -->
                <div class="label">時計</div>
            </button>
            <button class="tab-item" id="nav-stopwatch">
                <!-- 改良点: アイコンを削除 -->
                <div class="label">SW</div>
            </button>
            <button class="tab-item" id="nav-alarm">
                <!-- 改良点: アイコンを削除 -->
                <div class="label">アラーム</div>
            </button>
            <button class="tab-item" id="nav-settings">
                <!-- 改良点: アイコンを削除 -->
                <div class="label">設定</div>
            </button>
        </nav>

        <!-- 広告表示エリア（最下部に固定） -->
        <div class="ad-container-bottom">
            Sponsored Ad Area
        </div>
    </div>

    <!-- 改良点: PiP用の隠しビデオ要素 -->
    <video id="pip-video" style="display:none;" playsinline muted></video>
    <script src="script.js"></script>

<!-- 【追加】フローティング時計の要素 -->
<div id="floating-clock" style="display:none;">
    <div id="floating-display">00:00:00</div>
    <div id="floating-close" onclick="toggleFloatingClock()">×</div>
</div>
</body>
</html>
